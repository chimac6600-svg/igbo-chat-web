* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; height: 100%; overflow: hidden;
  background: #15151a; color: #f2f2f2;
  font-family: -apple-system, system-ui, sans-serif;
}
#app { display: flex; flex-direction: column; height: 100dvh; max-width: 720px; margin: 0 auto; }
header {
  padding: 12px 16px; background: #1f1f27; border-bottom: 1px solid #2c2c36;
  font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px;
}
header .dot { width: 9px; height: 9px; border-radius: 50%; background: #2E7D55; }
#messages {
  flex: 1; min-height: 0; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px;
}
.msg {
  max-width: 80%; padding: 10px 14px; border-radius: 14px; line-height: 1.5;
  word-break: break-word; background: #2a2a33; align-self: flex-start;
}
.msg.me { background: #2E6F4E; align-self: flex-end; }
.msg .glyphtext { font-family: 'IgboGlyphs'; font-size: 26px; line-height: 2.0; word-spacing: 0.4em; letter-spacing: 0.12em; }

/* ===== alignment system (verbatim from Transcribe_Engine) ===== */
.glyphtext .desc, #preview .desc { display:inline-block; position:relative; top:0.28em; overflow:visible; }
.glyphtext .band-vow-nc, #preview .band-vow-nc { display:inline-block; transform:scale(1.4); transform-origin:left bottom; vertical-align:baseline; margin-right:0.15em; }
.glyphtext .band-vow-reg, #preview .band-vow-reg { display:inline-block; transform:scale(1.274); transform-origin:left bottom; vertical-align:baseline; margin-right:0.15em; }
.glyphtext .band-vow-nc.fl-a, #preview .band-vow-nc.fl-a { transform:scale(1.4) translateY(0.147em); }
.glyphtext .band-vow-nc.fl-u, #preview .band-vow-nc.fl-u { transform:scale(1.4) translateY(0.101em); }
.glyphtext .band-vow-nc.fl-mn, #preview .band-vow-nc.fl-mn { transform:scale(1.4); }
.glyphtext .band-vow-reg.fl-a, #preview .band-vow-reg.fl-a { transform:scale(1.274) translateY(0.134em); }
.glyphtext .band-vow-reg.fl-u, #preview .band-vow-reg.fl-u { transform:scale(1.274) translateY(0.092em); }
.glyphtext .band-vow-reg.fl-mn, #preview .band-vow-reg.fl-mn { transform:scale(1.274); }
.msg .meta { font-size: 11px; color: #9a9aa5; margin-top: 4px; }
.msg.me .meta { color: #bfe3cf; }
.empty { color: #6a6a75; text-align: center; margin: auto; font-size: 14px; line-height: 1.6; }

#composer { border-top: 1px solid #2c2c36; background: #1b1b21; }
#preview {
  min-height: 40px; padding: 10px 16px; font-family: 'IgboGlyphs'; font-size: 26px;
  line-height: 2.0; word-spacing: 0.4em; letter-spacing: 0.12em;
  word-break: break-word; border-bottom: 1px solid #2c2c36;
  display: flex; align-items: center;
}
#preview:empty::before { content: 'Tap glyphs to compose...'; font-family: system-ui; font-size: 14px; color: #5a5a65; }

#kbd { padding: 6px; display: flex; flex-direction: column; gap: 4px; user-select: none; }
.kpage { display: flex; flex-direction: column; gap: 4px; }
.krow { display: flex; gap: 4px; height: 32px; }
.key {
  flex: 1 1 0; min-width: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: #34343c; border-radius: 4px; cursor: pointer; font-size: 15px;
  border: none; color: #f2f2f2; padding: 0; transition: background .08s;
}
.key:active { background: #4a4a55; }
.key.glyph { font-family: 'IgboGlyphs'; font-size: 18px; background: #3e3e46; padding-bottom: 4px; }
.key.glyph.kcons { font-size: 14px; }
.key.ctrl { background: #4a4a55; }
.key.accent { background: #2E6F4E; }
.key.wide { flex: 2.5; }
.key.narrow { flex: 0.78 1 0; }
.key.space { flex: 1.7 1 0; }
.key.enter { flex: 1.25 1 0; font-family: -apple-system, system-ui, sans-serif; font-size: 17px; }
.tone { position: relative; }
.tone svg { width: 60%; height: 60%; }
#sendbar { display: flex; gap: 8px; padding: 8px 16px 14px; }
#sendbar button {
  flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 15px;
  font-weight: 600; cursor: pointer;
}
#clearbtn { background: #34343c; color: #f2f2f2; }
#sendbtn { background: #2E7D55; color: #fff; flex: 3; }
#sendbtn:disabled { background: #2a4a3a; color: #88a; cursor: default; }
</style>
</head>
<body>

  <div id="messages"><div class="empty" id="emptymsg">No messages yet.<br>Compose below and send.</div></div>
  <div id="composer">
    <div id="preview"></div>
    <div id="kbd"></div>
    <div id="sendbar">
      <button id="clearbtn">Clear</button>
      <button id="sendbtn" disabled>Send</button>
    </div>
  </div>
</div>

  let out='';
  for(const u of units){
    if(u.type==='sep'){ out+=escapeHtml(u.ch); continue; }
    const ch=uCharAt(u, isNoun);
    const c=u.c||'';
    const isDesc=/^[PFST]$/.test(c);
    let span=ch;
    if(u.type==='vowel'){
      const base=isNoun?'band-vow-nc':'band-vow-reg';
      const fl={'A':' fl-a','U':' fl-u','u_dot':' fl-u','m_dot':' fl-mn','n_dot':' fl-mn'}[u.v]||'';
      span='<span class="'+base+fl+'">'+ch+'</span>';
    }
    if(isDesc) span='<span class="desc">'+span+'</span>';
    out+=span;
  }
  return out;
}
// snapshot live engine units (incl. any pending consonant) for sending/preview
function snapshotUnits(){
  const u=st.units.slice();
  if(st.pend) u.push({type:'cons',c:st.pend});
  return u.map(x=>Object.assign({},x));
}
const Engine = {
  consonant(c){ if(st.pend)commitPend(); if(breaking()){ st.units.push({type:'cons',c}); if(!st.fbL)st.fb=false; } else st.pend=c; },
  vowel(v){ if(st.pend&&!breaking()){ const c=st.pend; st.pend=null; st.units.push({type:'mora',c,v,t:'downstep',g:'no_glide',l:'short'}); }
            else { if(st.pend)commitPend(); st.units.push({type:'vowel',v,t:'downstep',g:'no_glide',l:'short'}); if(!st.fbL)st.fb=false; } },
  tone(t){ const u=lastVC(); if(u) u.t=(u.t===t?'downstep':t); },
  glide(g){ const u=lastVC(); if(u) u.g=(u.g===g?'no_glide':g); },
  length(){ const u=lastVC(); if(u) u.l=LENGTHS[(LENGTHS.indexOf(u.l)+1)%3]; },
  sep(ch){ commitPend(); st.units.push({type:'sep',ch}); if(!st.nlL)st.nl=false; if(!st.fbL)st.fb=false; },
  backspace(){ if(st.pend){ st.pend=null; return; } const u=st.units[st.units.length-1]; if(!u)return;
    if(u.type==='mora') st.units[st.units.length-1]={type:'cons',c:u.c}; else st.units.pop(); },
  clear(){ st.units=[]; st.pend=null; st.fb=false; st.fbL=false; st.nl=false; st.nlL=false; },
  fbToggle(){ if(st.fbL){st.fbL=false;st.fb=false;} else if(st.fb){st.fbL=true;} else st.fb=true; },
  nlToggle(){ if(st.nlL){st.nlL=false;st.nl=false;} else if(st.nl){st.nlL=true;} else st.nl=true; }
};

// ---- keycap glyphs ----
function consCap(c){ return String.fromCodePoint(R.cons[c]); }
function vowCap(v){ return String.fromCodePoint(R.vbase_reg[v]); }
function glideCap(g){
  const names={pre_iy:'n_dot',post_iy:'m_dot',pre_uw:'m_dot',post_uw:'n_dot'};
  const base=R.vbase[names[g]]; return String.fromCodePoint(base+off('downstep',g,'short'));
}

// ---- build keyboard ----
const ROWS_CONS=[['V','Z','ZH','J','B','D','G','L','R','H'],
                 ['F','S','SH','CH','P','T','K','N','M','W'],
                 ['GH','GB','KP','GW','KW','NW','NY','Ng','Y']];
const GLIDES4=['pre_iy','post_iy','pre_uw','post_uw'];
const kbd=document.getElementById('kbd'), preview=document.getElementById('preview'), sendbtn=document.getElementById('sendbtn');

// two keyboard pages inside #kbd: main (glyphs) and symbols
const pageMain=document.createElement('div'); pageMain.className='kpage';
const pageSym=document.createElement('div'); pageSym.className='kpage'; pageSym.style.display='none';
kbd.appendChild(pageMain); kbd.appendChild(pageSym);
function showSymbols(on){ pageMain.style.display=on?'none':''; pageSym.style.display=on?'':'none'; }

function refresh(){ preview.innerHTML=unitsToHTML(snapshotUnits(), noun()); sendbtn.disabled = st.units.length===0 && !st.pend; }
function mkkey(cls, label, fn){ const b=document.createElement('button'); b.className='key '+cls; if(label!==null)b.textContent=label;
  b.addEventListener('click',()=>{ fn(); refresh(); }); return b; }
function mkrow(){ const r=document.createElement('div'); r.className='krow'; return r; }

// numerals 1-9, 0
let r=mkrow(); for(let n=1;n<=9;n++){ const x=n; r.appendChild(mkkey('ctrl',String(n),()=>Engine.sep(String(x)))); }
r.appendChild(mkkey('ctrl','0',()=>Engine.sep('0'))); pageMain.appendChild(r);
// consonants
ROWS_CONS.forEach(row=>{ const rr=mkrow(); row.forEach(c=>rr.appendChild(mkkey('glyph kcons',consCap(c),()=>Engine.consonant(c)))); pageMain.appendChild(rr); });
// vowels
{ const rr=mkrow(); R.vowels.forEach(v=>rr.appendChild(mkkey('glyph',vowCap(v),()=>Engine.vowel(v)))); pageMain.appendChild(rr); }
// modifiers: glides, length, tones (tones drawn as SVG strokes), + !#1 symbols toggle
{ const rr=mkrow();
  GLIDES4.forEach(g=>rr.appendChild(mkkey('glyph',glideCap(g),()=>Engine.glide(g))));
  rr.appendChild(mkkey('ctrl','\u5F61',()=>Engine.length()));
  const toneSvg={low:'<svg viewBox=\'0 0 20 20\'><line x1=\'3\' y1=\'3\' x2=\'17\' y2=\'15\' stroke=\'currentColor\' stroke-width=\'2.4\' stroke-linecap=\'round\'/></svg>',
                 high:'<svg viewBox=\'0 0 20 20\'><line x1=\'3\' y1=\'15\' x2=\'17\' y2=\'3\' stroke=\'currentColor\' stroke-width=\'2.4\' stroke-linecap=\'round\'/></svg>',
                 mid:'<svg viewBox=\'0 0 20 20\'><line x1=\'3\' y1=\'9\' x2=\'17\' y2=\'9\' stroke=\'currentColor\' stroke-width=\'2.4\' stroke-linecap=\'round\'/></svg>'};
  ['low','high','mid'].forEach(t=>{ const b=mkkey('ctrl tone',null,()=>Engine.tone(t)); b.innerHTML=toneSvg[t]; rr.appendChild(b); });
  rr.appendChild(mkkey('ctrl','!#1',()=>showSymbols(true)));
  pageMain.appendChild(rr);
}
// control row: backspace, comma, period, space, forcebreak, nounlock, Enter
{ const rr=mkrow();
  rr.appendChild(mkkey('ctrl','\u232B',()=>Engine.backspace()));
  rr.appendChild(mkkey('ctrl narrow',',',()=>Engine.sep(',')));
  rr.appendChild(mkkey('ctrl narrow','.',()=>Engine.sep('.')));
  rr.appendChild(mkkey('accent space','\u23B5',()=>Engine.sep(' ')));
  rr.appendChild(mkkey('ctrl','\u2298',()=>Engine.fbToggle()));
  const nl=mkkey('ctrl glyph', String.fromCodePoint(R.cons?0:0), ()=>Engine.nlToggle());
  nl.style.fontSize='11px';
  nl.textContent='';  // noun-lock label uses A + noun-A glyphs
  try { nl.textContent = String.fromCodePoint(983071) + String.fromCodePoint(988480); } catch(e){}
  rr.appendChild(nl);
  const ent=mkkey('accent enter','\u23CE',()=>sendMessage()); ent.id='enterkey';
  rr.appendChild(ent);
  pageMain.appendChild(rr);
}

// ---- symbols page (own layer, with its own back key) ----
const SYM_ROWS=[
  ['1','2','3','4','5','6','7','8','9','0'],
  ['!','@','#','$','%','^','&','*','(',')'],
  ['-','_','+','=','/','\\',':',';','"','\''],
  ['?','<','>','[',']','{','}','|','~','`']
];
SYM_ROWS.forEach(row=>{ const rr=mkrow(); row.forEach(s=>rr.appendChild(mkkey('ctrl',s,()=>Engine.sep(s)))); pageSym.appendChild(rr); });
// symbols control row: back, comma, period, space, backspace
{ const rr=mkrow();
  rr.appendChild(mkkey('accent','ABG', ()=>showSymbols(false)));
  rr.appendChild(mkkey('ctrl',',',()=>Engine.sep(',')));
  rr.appendChild(mkkey('ctrl','.',()=>Engine.sep('.')));
  rr.appendChild(mkkey('accent space','\u23B5',()=>Engine.sep(' ')));
  rr.appendChild(mkkey('ctrl','\u232B',()=>Engine.backspace()));
  const ent=mkkey('accent enter','\u23CE',()=>sendMessage());
  rr.appendChild(ent);
  pageSym.appendChild(rr);
}

// ---- messages (Stage 1: local only) ----
const messages=document.getElementById('messages'), emptymsg=document.getElementById('emptymsg');
let msgs=[];
function addMsg(msg, mine){
  if(emptymsg) emptymsg.remove();
  const d=document.createElement('div'); d.className='msg'+(mine?' me':'');
  const g=document.createElement('div'); g.className='glyphtext';
  g.innerHTML=unitsToHTML(msg.units, msg.noun); d.appendChild(g);
  const m=document.createElement('div'); m.className='meta'; m.textContent=mine?'You':'\u2014'; d.appendChild(m);
  messages.appendChild(d); messages.scrollTop=messages.scrollHeight;
}
function sendMessage(){
  commitPend();
  const units=snapshotUnits(); if(units.length===0)return;
  const msg={ units, noun: noun() };
  addMsg(msg,true); msgs.push(msg); Engine.clear(); refresh();
}
document.getElementById('sendbtn').addEventListener('click', sendMessage);
document.getElementById('clearbtn').addEventListener('click',()=>{ Engine.clear(); refresh(); });
refresh();
</script>
</body>
</html>
